### model
model_name_or_path: Qwen/Qwen2.5-7B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z3_config.json  # choices: [ds_z0_config.json, ds_z2_config.json, ds_z3_config.json]

### dataset
dataset: misleading_sft
template: qwen
cutoff_len: 8192
# max_samples: 1000
preprocessing_num_workers: 16
dataloader_num_workers: 4
train_on_prompt: false  # Explicitly ensure we don't train on user queries
mask_history: false     # Explicitly ensure we train on ALL assistant turns

### output
output_dir: saves/qwen2_5-7b/full/sft_misleading_more_more_clean
logging_steps: 10
save_steps: 50
save_total_limit: 10 
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]


### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 1.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

